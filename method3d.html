<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Detection method — masked-diffusion architecture (3D)</title>
<style>
  :root{--ink:#e8ecf7;--mut:#9aa6c7;--gold:#ffb648;--line:#26304f}
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:#070b18;overflow:hidden;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  #c{position:fixed;inset:0;display:block}
  .ui{position:fixed;z-index:2;pointer-events:none}
  #ttl{top:16px;left:20px;max-width:600px}
  #ttl h1{margin:0 0 3px;font-size:17px;letter-spacing:-.01em}
  #ttl p{margin:0;color:var(--mut);font-size:12.5px} #ttl b{color:var(--gold)}
  #hint{top:16px;right:20px;color:var(--mut);font-size:12px;font-family:ui-monospace,Menlo,monospace;text-align:right}
  #step{bottom:18px;left:50%;transform:translateX(-50%);font-family:ui-monospace,Menlo,monospace;font-size:13px;color:#bcd0ff;background:rgba(12,18,38,.7);border:1px solid var(--line);border-radius:9px;padding:7px 14px}
  #err{position:fixed;inset:0;display:none;place-items:center;color:var(--mut);text-align:center;padding:24px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui" id="ttl"><h1>Masked-diffusion decoding — and our free readout</h1><p>pixels → tokens → iterative unmasking through the transformer · <b>gold = our hook + trajectory score</b></p></div>
<div class="ui" id="hint">drag rotate · scroll zoom</div>
<div class="ui" id="step">denoising step <span id="stepn">0</span> / 32</div>
<div id="err">Open in a browser with internet to load the 3D engine.</div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
if(!window.THREE){document.getElementById('err').style.display='grid';}
else (function(){
  const cv=document.getElementById('c');
  const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
  const scene=new THREE.Scene(); scene.background=new THREE.Color(0x070b18); scene.fog=new THREE.Fog(0x070b18,34,72);
  const cam=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,0.1,200);
  scene.add(new THREE.AmbientLight(0xffffff,.66));
  const key=new THREE.DirectionalLight(0xffffff,.95); key.position.set(8,18,12); scene.add(key);
  const rim=new THREE.DirectionalLight(0x6f8cff,.5); rim.position.set(-12,6,-8); scene.add(rim);
  const root=new THREE.Group(); scene.add(root);
  const BLUE=0x3a63d8, VBLUE=0x6f8cff, TXT=0x8893b8, GOLD=0xffb648, GREEN=0x31d0aa, RED=0xff5470, MASK=0x2a1c33;

  function label(text,color="#e8ecf7",size=44,bold=true){
    const pad=16,cnv=document.createElement('canvas'),g=cnv.getContext('2d');
    g.font=`${bold?700:500} ${size}px -apple-system,Segoe UI,sans-serif`;
    const w=g.measureText(text).width; cnv.width=w+pad*2; cnv.height=size+pad*2;
    g.font=`${bold?700:500} ${size}px -apple-system,Segoe UI,sans-serif`; g.fillStyle=color; g.textBaseline='middle'; g.fillText(text,pad,cnv.height/2);
    const tex=new THREE.CanvasTexture(cnv); tex.anisotropy=4;
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
    sp.scale.set(cnv.width/120,cnv.height/120,1); return sp;
  }
  function box(x,y,z,w,h,d,color,op=0.9){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color,transparent:true,opacity:op}));
    m.position.set(x,y,z); root.add(m);
    const e=new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.12})); e.position.set(x,y,z); root.add(e); return m;
  }
  function lab(t,x,y,z,c,s){const l=label(t,c,s);l.position.set(x,y,z);root.add(l);return l;}

  // ================= 1. PIXEL IMAGE (a photo as voxels) =================
  const IMG=new THREE.Group(); IMG.position.set(-15,2.5,0); IMG.rotation.y=Math.PI/2; root.add(IMG);
  const NP=9;                       // pixels per side
  // simple recognizable scene: sky (top), sun (circle), ground (bottom)
  function pixColor(u,v){ // u,v in 0..1 ; v=0 bottom
    if(v<0.34){ return new THREE.Color().setHSL(0.28,0.5,0.34+0.08*Math.random()); } // grass
    const sx=0.72,sy=0.72, dx=u-sx, dy=v-sy;                                          // sun
    if(dx*dx+dy*dy<0.03) return new THREE.Color(0xffcf4a);
    return new THREE.Color().setHSL(0.58,0.55,0.5+0.06*(v-0.34));                      // sky
  }
  for(let i=0;i<NP;i++)for(let j=0;j<NP;j++){
    const u=j/(NP-1), v=i/(NP-1);
    const m=new THREE.Mesh(new THREE.BoxGeometry(0.52,0.52,0.3),new THREE.MeshLambertMaterial({color:pixColor(u,v)}));
    m.position.set((j-NP/2+0.5)*0.56,(i-NP/2+0.5)*0.56,0); IMG.add(m);
    const e=new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),new THREE.LineBasicMaterial({color:0x0a0f1e,transparent:true,opacity:.5})); e.position.copy(m.position); IMG.add(e);
  }
  lab("image (pixels)",-15,7.0,0,"#c7d0ea",38);
  lab("Q: “Is there a cat?”",-15,-1.2,0,"#8893b8",28);

  // ================= 2. MASKED-DIFFUSION DECODING (real architecture) =================
  // token sequence along Z at the base: image tokens + text tokens + [MASK] answer tokens
  const SEQ=['i','i','i','i','t','t','m','m','m','m','m','m'];
  const answerTargets=[GREEN,VBLUE,GOLD,GREEN,VBLUE,GOLD]; // colors the masks resolve to
  const baseY=0.0, seqX=-6.5, dz=0.86;
  const tokens=[];
  SEQ.forEach((k,idx)=>{
    const isM=k==='m'; const color = k==='i'?VBLUE : k==='t'?TXT : MASK;
    const m=new THREE.Mesh(new THREE.BoxGeometry(0.64,0.64,0.64),new THREE.MeshLambertMaterial({color,transparent:true,opacity:isM?0.6:0.95}));
    m.position.set(seqX, baseY, (idx-SEQ.length/2+0.5)*dz); root.add(m);
    let edge=null;
    if(isM){edge=new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),new THREE.LineBasicMaterial({color:RED,transparent:true,opacity:.85}));edge.position.copy(m.position);root.add(edge);}
    tokens.push({m,edge,kind:k,resolved:false,target:isM?answerTargets[Math.max(0,idx-6)]:color});
  });
  lab("token sequence:  image · text · [MASK] answer",-6.5,-1.4,0,"#c7d0ea",30);

  // the bidirectional transformer stack above the tokens
  const layers=[]; for(let l=0;l<5;l++)layers.push(box(-3.2, 3.2+l*1.0, 0, 2.0, 0.75, SEQ.length*dz+0.6, BLUE, 0.8));
  lab("masked-diffusion transformer",-3.2,9.0,0,"#c7d0ea",34);
  lab("(bidirectional · T reverse steps)",-3.2,8.35,0,"#8893b8",26);

  // attention lines: each token -> bottom of transformer (shows all tokens attend)
  const attnMat=new THREE.LineBasicMaterial({color:0x3f5aa8,transparent:true,opacity:.28});
  tokens.forEach(tk=>{
    const g=new THREE.BufferGeometry().setFromPoints([tk.m.position.clone(), new THREE.Vector3(-3.2,2.8,tk.m.position.z)]);
    root.add(new THREE.Line(g,attnMat));
  });

  // ================= 3. LM HEAD + FORWARD HOOK (gold, ours) =================
  box(0.6,3.0,0,1.0,1.8,SEQ.length*dz*0.5,GREEN,0.9); lab("LM head",0.6,4.6,0,"#8bf0cf",30);
  // LM head output = a distribution over vocab (logit bars; argmax = predicted token)
  const logits=[]; const NB=11, argmax=6;
  for(let k=0;k<NB;k++){
    const m=new THREE.Mesh(new THREE.BoxGeometry(0.11,1,0.11),new THREE.MeshBasicMaterial({color:k===argmax?0xffffff:0x8bf0cf,transparent:true,opacity:0.92}));
    m.position.set(1.55,3.0,(k-NB/2+0.5)*0.17); root.add(m); logits.push({m,k});
  }
  lab("logits over vocab",2.0,1.6,0,"#8bf0cf",22);
  const hook=box(0.6,6.2,0,1.5,0.9,3.0,GOLD,0.92);
  const clamp=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,2.2,10),new THREE.MeshBasicMaterial({color:GOLD})); clamp.position.set(0.6,5.0,0); root.add(clamp);
  lab("forward hook  (ours)",0.9,7.6,0,"#ffcf88",32); lab("reads per-step logits · free",0.9,7.0,0,"#c9a668",24);

  // ================= 4. MEAN STEP-ENTROPY (gold) =================
  const pts=[]; for(let i=0;i<=36;i++){const t=i/36;const e=0.9+0.34*Math.sin(t*10)+0.18*Math.sin(t*23)-0.5*Math.pow(t,4);pts.push(new THREE.Vector3(3.2+t*3.0,5.6+Math.max(0.1,e)*1.1,0));}
  root.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),70,0.08,8,false),new THREE.MeshBasicMaterial({color:GOLD})));
  const gauge=box(4.7,2.6,0,1.2,1.5,3.0,GOLD,0.85); lab("mean step-entropy = error score",4.9,4.4,0,"#ffcf88",30);

  // ================= 5. ABSTAIN / CALIBRATE =================
  const gy=box(8.4,4.2,0,1.3,1.0,2.2,GREEN,0.9); const gn=box(8.4,1.2,0,1.3,1.0,2.2,RED,0.9);
  lab("answer ✓",9.9,4.2,0,"#8bf0cf",26); lab("route to human ✗",10.4,1.2,0,"#ffb3c0",26);
  function tube(a,b,c){root.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3([a,b]),20,0.05,6,false),new THREE.MeshBasicMaterial({color:c})));}
  tube(new THREE.Vector3(5.3,3.0,0),new THREE.Vector3(7.7,4.2,0),GREEN);
  tube(new THREE.Vector3(5.3,2.2,0),new THREE.Vector3(7.7,1.2,0),RED);

  // flow arrows between big stages
  function arrow(x1,x2,y){const l=x2-x1;const c=new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.045,l,8),new THREE.MeshBasicMaterial({color:0x44507a}));c.rotation.z=Math.PI/2;c.position.set((x1+x2)/2,y,0);root.add(c);const h=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.4,10),new THREE.MeshBasicMaterial({color:0x44507a}));h.rotation.z=-Math.PI/2;h.position.set(x2,y,0);root.add(h);}
  arrow(-12.6,-9.4,2.5); arrow(1.4,3.0,4.0); arrow(5.4,7.7,3.0);

  root.position.set(2,-2.2,0);

  // ---- orbit ----
  let radius=27,theta=0.82,phi=1.08,drag=false,px=0,py=0,auto=true;
  const target=new THREE.Vector3(-2,2.5,0);
  function camU(){cam.position.set(target.x+radius*Math.sin(phi)*Math.cos(theta),target.y+radius*Math.cos(phi),target.z+radius*Math.sin(phi)*Math.sin(theta));cam.lookAt(target);}
  cv.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;auto=false;});
  addEventListener('pointerup',()=>drag=false);
  addEventListener('pointermove',e=>{if(!drag)return;theta+=(e.clientX-px)*0.006;phi=Math.max(0.3,Math.min(1.5,phi+(e.clientY-py)*0.005));px=e.clientX;py=e.clientY;});
  cv.addEventListener('wheel',e=>{e.preventDefault();radius=Math.max(15,Math.min(46,radius+e.deltaY*0.02));},{passive:false});
  function rs(){renderer.setSize(innerWidth,innerHeight);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();} addEventListener('resize',rs); rs();

  const masks=tokens.filter(t=>t.kind==='m'); const stepEl=document.getElementById('stepn');
  const t0=performance.now();
  function anim(){
    const t=(performance.now()-t0)/1000; if(auto)theta+=0.0016; camU();
    // iterative unmasking: over a 4s loop, masks resolve one-by-one (parallel-ish), then reset
    const T=32, loop=(t*0.5)%1, step=Math.floor(loop*T); stepEl.textContent=step;
    masks.forEach((tk,i)=>{
      const resolveAt=(i+1)/(masks.length+1); const on=loop>resolveAt;
      if(on&&!tk.resolved){tk.resolved=true;}
      if(!on&&tk.resolved&&loop<0.05){tk.resolved=false;}
      const res=loop>resolveAt;
      tk.m.material.color.setHex(res?tk.target:MASK);
      tk.m.material.opacity=res?0.96:0.6;
      if(tk.edge)tk.edge.material.opacity=res?0.0:0.85;
      // little "pop" when just resolved
      const near=Math.abs(loop-resolveAt); const s=res&&near<0.05?1.25:1.0; tk.m.scale.setScalar(s);
    });
    // transformer shimmer
    layers.forEach((s,i)=>s.material.opacity=0.7+0.14*Math.sin(t*2+i*0.6));
    // gold glow
    hook.material.opacity=0.7+0.3*Math.sin(t*3); gauge.material.opacity=0.7+0.25*Math.sin(t*3+1); clamp.material.color.setHSL(0.11,1,0.42+0.14*Math.sin(t*4));
    // logit distribution shifts each step; predicted token (argmax) stays tallest
    const yb=2.4; logits.forEach(o=>{const base=o.k===argmax?1.7:0.3; const h=base+(o.k===argmax?0.2*Math.sin(t*4):0.16*Math.abs(Math.sin(t*2.2+o.k)));o.m.scale.y=h;o.m.position.y=yb+h*0.5;});
    renderer.render(scene,cam); requestAnimationFrame(anim);
  }
  anim();
})();
</script>
</body>
</html>
