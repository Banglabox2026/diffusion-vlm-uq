<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Detection method — signal-flow (3D)</title>
<style>
  :root{--ink:#eaf0ff;--mut:#93a0c8;--gold:#ffc24d;--line:#22305a}
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:#04060f;overflow:hidden;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  #c{position:fixed;inset:0;display:block}
  .ui{position:fixed;z-index:2;pointer-events:none}
  #ttl{top:16px;left:20px;max-width:560px}
  #ttl h1{margin:0 0 3px;font-size:17px;letter-spacing:-.01em}
  #ttl p{margin:0;color:var(--mut);font-size:12.5px} #ttl b{color:var(--gold)}
  #hint{top:16px;right:20px;color:var(--mut);font-size:12px;font-family:ui-monospace,Menlo,monospace;text-align:right}
  #err{position:fixed;inset:0;display:none;place-items:center;color:var(--mut);text-align:center;padding:24px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui" id="ttl"><h1>Detection method — a signal-flow view</h1><p>data streams through five stages · <b>gold = our free readout</b></p></div>
<div class="ui" id="hint">drag rotate · scroll zoom</div>
<div id="err">Open in a browser with internet to load the 3D engine.</div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
if(!window.THREE){document.getElementById('err').style.display='grid';}
else (function(){
  const cv=document.getElementById('c');
  const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
  const scene=new THREE.Scene(); scene.background=new THREE.Color(0x04060f); scene.fog=new THREE.FogExp2(0x04060f,0.018);
  const cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,300);
  scene.add(new THREE.AmbientLight(0x8899ff,.5));
  const pl=new THREE.PointLight(0xffffff,.7,120); pl.position.set(0,18,10); scene.add(pl);
  const root=new THREE.Group(); scene.add(root);
  const BLUE=0x5f7dff, DEEP=0x3a63d8, GOLD=0xffc24d, TEAL=0x2fe0c0, RED=0xff5a78;

  // ---- grid floor ----
  const grid2=new THREE.GridHelper(80,40,0x2b3d78,0x122043); grid2.position.y=-4.5; grid2.material.transparent=true; grid2.material.opacity=0.5; root.add(grid2);

  function label(text,color="#eaf0ff",size=44,bold=true){
    const pad=18,cnv=document.createElement('canvas'),g=cnv.getContext('2d');
    g.font=`${bold?700:500} ${size}px -apple-system,Segoe UI,sans-serif`;
    const w=g.measureText(text).width; cnv.width=w+pad*2; cnv.height=size+pad*2;
    g.font=`${bold?700:500} ${size}px -apple-system,Segoe UI,sans-serif`;
    g.shadowColor='rgba(0,0,0,.6)'; g.shadowBlur=8; g.fillStyle=color; g.textBaseline='middle'; g.fillText(text,pad,cnv.height/2);
    const tex=new THREE.CanvasTexture(cnv); tex.anisotropy=4;
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
    sp.scale.set(cnv.width/120,cnv.height/120,1); return sp;
  }

  // ---- nodes along a curved path (in depth, not a straight line) ----
  const NODES=[
    {p:new THREE.Vector3(-12,0.5, 3.5), c:BLUE,  t:"1 · image + question", s:"the query"},
    {p:new THREE.Vector3(-6, 2.0,-3.0), c:DEEP,  t:"2 · masked-diffusion decoding", s:"T reverse steps"},
    {p:new THREE.Vector3(0,  3.2, 2.5), c:GOLD,  t:"3 · forward hook  (ours)", s:"reads per-step logits · free", gold:true},
    {p:new THREE.Vector3(6,  2.0,-2.0), c:GOLD,  t:"4 · mean step-entropy", s:"= error score", gold:true},
    {p:new THREE.Vector3(12, 0.6, 3.0), c:TEAL,  t:"5 · abstain / calibrate", s:"answer ✓  ·  route ✗"},
  ];
  const nodeMeshes=[];
  NODES.forEach((nd,i)=>{
    const g=new THREE.Group(); g.position.copy(nd.p); root.add(g);
    const core=new THREE.Mesh(new THREE.IcosahedronGeometry(nd.gold?0.85:0.7, 2),
       new THREE.MeshStandardMaterial({color:nd.c,emissive:nd.c,emissiveIntensity:0.75,metalness:0.35,roughness:0.35}));
    g.add(core);
    const halo=new THREE.Mesh(new THREE.IcosahedronGeometry(nd.gold?1.7:1.4,1),
       new THREE.MeshBasicMaterial({color:nd.c,wireframe:true,transparent:true,opacity:0.28}));
    g.add(halo);
    // stage-specific flourishes
    if(i===1){ // decoding: orbiting token cubes
      for(let k=0;k<8;k++){const m=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.22,0.22),new THREE.MeshStandardMaterial({color:0x9fb4ff,emissive:0x3a63d8,emissiveIntensity:0.5}));m.userData.k=k;g.add(m);g.userData.tokens=g.userData.tokens||[];g.userData.tokens.push(m);}
    }
    if(i===3){ // entropy: a small ring
      const r=new THREE.Mesh(new THREE.TorusGeometry(1.15,0.05,8,40),new THREE.MeshBasicMaterial({color:GOLD,transparent:true,opacity:0.7}));r.rotation.x=Math.PI/2.4;g.add(r);g.userData.ring=r;
    }
    if(i===4){ // gate: two branch sub-nodes
      const up=new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16),new THREE.MeshStandardMaterial({color:TEAL,emissive:TEAL,emissiveIntensity:0.7}));up.position.set(1.4,1.2,0);g.add(up);
      const dn=new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16),new THREE.MeshStandardMaterial({color:RED,emissive:RED,emissiveIntensity:0.7}));dn.position.set(1.4,-1.2,0);g.add(dn);
    }
    const L=label(nd.t, nd.gold?"#ffd98a":"#dbe4ff", 40); L.position.set(0,nd.gold?2.5:2.1,0); g.add(L);
    const S=label(nd.s, "#9aa8d0", 28, false); S.position.set(0,nd.gold?1.9:1.6,0); g.add(S);
    g.userData.core=core; g.userData.halo=halo; g.userData.gold=nd.gold; nodeMeshes.push(g);
  });

  // ---- edges as raised curves + flowing particle streams ----
  const streams=[];
  for(let i=0;i<NODES.length-1;i++){
    const a=NODES[i].p, b=NODES[i+1].p;
    const mid=a.clone().lerp(b,0.5); mid.y+=2.4; // arc up
    const curve=new THREE.CatmullRomCurve3([a,mid,b]);
    const goldEdge = NODES[i].gold || NODES[i+1].gold;
    const col = goldEdge?GOLD:0x6f8cff;
    // faint tube
    const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,50,0.035,6,false),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.28})); root.add(tube);
    // particles
    const parts=[]; const N=16;
    for(let k=0;k<N;k++){
      const m=new THREE.Mesh(new THREE.SphereGeometry(0.11,10,10),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.95,blending:THREE.AdditiveBlending}));
      root.add(m); parts.push({m,t:k/N});
    }
    streams.push({curve,parts,gold:goldEdge});
  }

  // ---- ambient starfield ----
  const sg=new THREE.BufferGeometry(); const SN=380; const sp2=new Float32Array(SN*3);
  for(let i=0;i<SN;i++){sp2[i*3]=(Math.random()-0.5)*90;sp2[i*3+1]=(Math.random()-0.2)*40;sp2[i*3+2]=(Math.random()-0.5)*90;}
  sg.setAttribute('position',new THREE.BufferAttribute(sp2,3));
  const stars=new THREE.Points(sg,new THREE.PointsMaterial({color:0x3a4a80,size:0.12,transparent:true,opacity:0.7})); root.add(stars);

  root.position.y=-0.5;

  // ---- orbit ----
  let radius=27,theta=0.7,phi=1.05,drag=false,px=0,py=0,auto=true;
  const target=new THREE.Vector3(0,1.5,0);
  function camU(){cam.position.set(target.x+radius*Math.sin(phi)*Math.cos(theta),target.y+radius*Math.cos(phi),target.z+radius*Math.sin(phi)*Math.sin(theta));cam.lookAt(target);}
  cv.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;auto=false;});
  addEventListener('pointerup',()=>drag=false);
  addEventListener('pointermove',e=>{if(!drag)return;theta+=(e.clientX-px)*0.006;phi=Math.max(0.35,Math.min(1.45,phi+(e.clientY-py)*0.005));px=e.clientX;py=e.clientY;});
  cv.addEventListener('wheel',e=>{e.preventDefault();radius=Math.max(15,Math.min(46,radius+e.deltaY*0.02));},{passive:false});
  function rs(){renderer.setSize(innerWidth,innerHeight);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();} addEventListener('resize',rs); rs();

  const t0=performance.now();
  function anim(){
    const t=(performance.now()-t0)/1000; if(auto)theta+=0.0016; camU();
    // node pulse
    nodeMeshes.forEach((g,i)=>{
      const ph=t*2+i; g.userData.core.material.emissiveIntensity=0.6+0.35*Math.sin(ph)+(g.userData.gold?0.25:0);
      const hs=1+0.06*Math.sin(ph); g.userData.halo.scale.setScalar(hs); g.userData.halo.rotation.y+=0.004; g.userData.halo.rotation.x+=0.002;
      if(g.userData.tokens)g.userData.tokens.forEach(m=>{const a=m.userData.k/8*6.283+t*1.2;m.position.set(Math.cos(a)*1.15,Math.sin(a*1.3)*0.5,Math.sin(a)*1.15);});
      if(g.userData.ring)g.userData.ring.rotation.z+=0.02;
    });
    // flowing particles
    streams.forEach(s=>{s.parts.forEach(p=>{p.t=(p.t+(s.gold?0.004:0.003))%1;const v=s.curve.getPoint(p.t);p.m.position.copy(v);const fade=Math.sin(p.t*Math.PI);p.m.material.opacity=0.25+0.75*fade;p.m.scale.setScalar(0.7+0.6*fade);});});
    stars.rotation.y+=0.0004;
    renderer.render(scene,cam); requestAnimationFrame(anim);
  }
  anim();
})();
</script>
</body>
</html>
